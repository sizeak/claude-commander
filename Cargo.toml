[package]
name = "claude-commander"
version = "0.16.0"
edition = "2024"
authors = ["Claude Commander Contributors"]
description = "A high-performance terminal UI for managing Claude coding sessions"
license = "MIT"
repository = "https://github.com/claude-commander/claude-commander"
keywords = ["claude", "ai", "terminal", "tui", "tmux"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"

# CLI (derive macros - idiomatic Rust)
clap = { version = "4.5", features = ["derive"] }

# TUI
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }
ansi-to-tui = "8"
# Text-input buffer (cursor/editing) for the review comment box.
tui-input = "0.15"

# Git (pure Rust)
gix = { version = "0.68", default-features = false, features = [
    "worktree-mutation",
    "revision",
    "status",
    "dirwalk",
    "index",
] }

# Configuration (layered: env -> file -> CLI)
figment = { version = "0.10", features = ["toml", "env"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
thiserror = "2.0"
anyhow = "1.0"
color-eyre = "0.6"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Syntax highlighting for the review diff view (fancy-regex backend — pure
# Rust, no C/oniguruma dependency). `two-face` supplies an extended syntax set
# (the bat language set, incl. TypeScript/TSX/TOML/…) that syntect's bundled
# defaults lack.
syntect = { version = "5.2", default-features = false, features = [
    "default-fancy",
] }
two-face = { version = "0.4", default-features = false, features = [
    "syntect-fancy",
] }

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
directories = "5.0"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
regex = "1.10"

# Async utilities
async-trait = "0.1"

# PTY for terminal attachment
pty-process = { version = "0.5", features = ["async"] }

# Unix system calls (safe wrappers)
nix = { version = "0.29", features = ["term", "poll", "fs"] }

# Throbber/spinner widget
throbber-widgets-tui = "0.11"

# Fuzzy matching for the quick-select palette
fuzzy-matcher = "0.3"
rayon = "1.12.0"

# Conversation mode (TTS): HTTP client for the OpenAI-compatible TTS endpoint
# (rustls to avoid an OpenSSL C dependency, consistent with the pure-Rust lean)
# and in-process audio playback. rodio's cpal backend links ALSA on Linux —
# the build host needs alsa-lib (see flake.nix / CONTRIBUTING).
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
rodio = { version = "0.19", default-features = false, features = ["wav", "mp3"] }

[dev-dependencies]
# Property-based testing
proptest = "1.4"
# Async test utilities
tokio-test = "0.4"
# Temp directories for integration tests
tempfile = "3.10"
# Test assertions
pretty_assertions = "1.4"
# Snapshot testing
insta = "1.41"

[profile.release]
lto = true
codegen-units = 1
strip = true

[[bin]]
name = "claude-commander"
path = "src/main.rs"
