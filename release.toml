# Release automation driven by cargo-release.
# Run `cargo release patch` for a dry-run; add `--execute` to actually release.
# The GitHub release itself and the Homebrew tap bump are handled by
# .github/workflows/publish-tap.yml, which fires on tag push.

sign-commit = true
sign-tag    = true
push-remote = "origin"

tag-name                   = "v{{version}}"
tag-message                = "{{tag_name}}"
pre-release-commit-message = "Bump version to {{version}}"

# claude-commander isn't published on crates.io.
publish = false

# Only cut releases from main.
allow-branch = ["main"]
