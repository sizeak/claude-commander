name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Run clippy through the Nix dev shell so system dependencies (ALSA via
      # rodio, pkg-config, …) come from flake.nix — the single source of truth —
      # rather than a hand-maintained apt list that drifts from the flake.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Store Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-clippy-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-clippy-${{ runner.os }}-

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: nix develop -c cargo clippy --workspace --all-targets -- -D warnings

  nix:
    name: Nix Build
    runs-on: ubuntu-latest
    permissions:
      # cache purging
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Store Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Build
        run: nix build

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build and test through the Nix dev shell: tmux, git, ALSA and the Rust
      # toolchain all come from flake.nix. Tests run outside the Nix build
      # sandbox (unlike `nix build`), so the ones needing a real git repo work.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Store Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-test-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-test-${{ runner.os }}-

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: nix develop -c cargo build --workspace --all-targets

      - name: Run Tests
        run: nix develop -c cargo test --workspace

  client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Flutter + host-Rust + Linux-desktop toolchain comes from the slim
      # `clientCi` dev shell in flake.nix (no Android SDK/NDK). tmux + git are
      # present for the hermetic server the e2e boots.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Store Cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-client-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock', 'client/pubspec.lock') }}
          restore-prefixes-first-match: nix-client-${{ runner.os }}-

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/rust

      # The Flutter SDK comes from the Nix store (cached above); this caches the
      # downloaded pub packages so `flutter pub get` doesn't re-fetch every run.
      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Fetch Flutter Packages
        run: nix develop .#clientCi -c bash -c 'cd client && flutter pub get'

      - name: Analyze Dart
        run: nix develop .#clientCi -c bash -c 'cd client && flutter analyze lib test integration_test'

      - name: Run Dart Unit Tests
        run: nix develop .#clientCi -c bash -c 'cd client && flutter test'

      - name: Run cdylib Integration Tests
        run: nix develop .#clientCi -c bash -c 'cd client/rust && cargo test'

      - name: Run Linux End-to-End Tests
        # cargokit resolves `rustup` from ~/.cargo/bin *before* PATH, so on the
        # runner (which ships a preinstalled ~/.cargo/bin/rustup) it bypasses the
        # Nix shim and fails with `rustc -vV` exit 127. Point that path at the
        # shim so cargokit drives the Nix-pinned toolchain for the cdylib build.
        run: nix develop .#clientCi -c bash -c 'mkdir -p ~/.cargo/bin && ln -sf "$(command -v rustup)" ~/.cargo/bin/rustup && xvfb-run -a client/tool/e2e.sh'
