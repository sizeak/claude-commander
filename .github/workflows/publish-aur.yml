name: Publish to AUR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    # Skip pre-release tags like v0.3.0-rc.1
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Release Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute Source Tarball SHA256
        id: sha
        run: |
          version='${{ steps.version.outputs.version }}'
          url="https://github.com/sizeak/claude-commander/archive/refs/tags/v${version}.tar.gz"
          curl -fsSL "$url" -o source.tar.gz
          sum="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "sha256=${sum}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD Version And Checksum
        run: |
          version='${{ steps.version.outputs.version }}'
          sum='${{ steps.sha.outputs.sha256 }}'
          sed -i "s|^pkgver=.*|pkgver=${version}|" packaging/aur/PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${sum}')|" packaging/aur/PKGBUILD

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: claude-commander
          pkgbuild: ./packaging/aur/PKGBUILD
          commit_username: Simon Jackson
          commit_email: sizeak@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: 'Bump claude-commander to ${{ steps.version.outputs.version }}'
          ssh_keyscan_types: rsa,ed25519
